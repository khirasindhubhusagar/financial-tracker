<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="container">

    <h1>Financial Tracker</h1>

    <div class="balance-box">
        <h2>Balance</h2>
        <h3 id="balance">₹0</h3>
    </div>

    <div class="summary">

        <div class="income">
            <h3>Income</h3>
            <p id="income">₹0</p>
        </div>

        <div class="expense">
            <h3>Expense</h3>
            <p id="expense">₹0</p>
        </div>

    </div>

    <form id="transaction-form">

        <input
        type="text"
        id="text"
        placeholder="Enter Description"
        required>

        <input
        type="number"
        id="amount"
        placeholder="Enter Amount (+ income, - expense)"
        required>

        <button type="submit">
            Add Transaction
        </button>

    </form>

    <h2>History</h2>

    <ul id="list"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
